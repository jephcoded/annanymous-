services:
  - type: web
    name: ananymous-backend
    runtime: node
    rootDir: anonymous-app-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PGSSLMODE
        value: require
      - key: CHAIN_ID
        value: 84532
      - key: CLIENT_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SOCIAL_CONTRACT_ADDRESS
        sync: false
      - key: ADMIN_WALLETS
        sync: false
      - key: ADMIN_PANEL_EMAIL
        sync: false
      - key: ADMIN_PANEL_PASSWORD
        sync: false

  - type: web
    name: ananymous-admin-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: npm run admin:web
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_WEB_HOST
        value: 0.0.0.0
      - key: ADMIN_API_PROXY_BASE
        value: https://annanymous-o8qp.onrender.com
